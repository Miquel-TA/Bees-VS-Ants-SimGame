                ctx.beginPath(); ctx.moveTo(u.settleTarget.x, u.settleTarget.y);
                ctx.arc(u.settleTarget.x, u.settleTarget.y, 24, -Math.PI/2, -Math.PI/2 + p*Math.PI*2); ctx.fill();
            }
        }
    });

    fishes.forEach(f => f.draw(ctx)); 
    resources.forEach(r => drawEmojiTree(ctx, r.pos.x, r.pos.y, r.amount));
    bases.forEach(b => b.draw(ctx));
    units.forEach(u => u.draw(ctx));

    units.forEach(u => {
        if (showVis[u.type]) {
            ctx.strokeStyle = u.team === 0 ? 'rgba(255, 80, 80, 0.25)' : 'rgba(255, 200, 50, 0.25)';
            ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(u.pos.x, u.pos.y, u.vision, 0, Math.PI*2); ctx.stroke();
        }
        if (showPath[u.type]) {
            let tgtObj = u.target || u.exploreTarget;
            if (tgtObj && u.state !== C.STATE.LARVA) {
                let tx = tgtObj.x !== undefined ? tgtObj.x : (tgtObj.pos ? tgtObj.pos.x : null);
                let ty = tgtObj.y !== undefined ? tgtObj.y : (tgtObj.pos ? tgtObj.pos.y : null);
                if (tx !== null && ty !== null) {
                    ctx.strokeStyle = u.team === 0 ? 'rgba(255, 80, 80, 0.4)' : 'rgba(255, 200, 50, 0.4)';
                    ctx.lineWidth = 1.5; ctx.setLineDash([5, 5]);
                    ctx.beginPath(); ctx.moveTo(u.pos.x, u.pos.y); ctx.lineTo(tx, ty); ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }
    });

    leaves.forEach(l => l.draw(ctx)); birds.forEach(b => b.draw(ctx)); clouds.forEach(c => c.draw(ctx)); 
    
    ctx.textAlign = 'center'; ctx.font = '20px sans-serif';
    particles.forEach(p => { ctx.globalAlpha = Math.min(1.0, p.life); ctx.fillText(p.text, p.x, p.y); });
    ctx.globalAlpha = 1.0;

    ctx.restore(); 
    ctx.drawImage(fogCanvas, 0, 0);
    ctx.restore(); 
    
    bases.forEach(b => {
        let sx = (b.pos.x - cam.x) * cam.z + canvas.width / 2;
        let sy = (b.pos.y - cam.y) * cam.z + canvas.height / 2;
        
        if (sx < 0 || sx > canvas.width || sy < 0 || sy > canvas.height) {
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            let angle = Math.atan2(sy - cy, sx - cx);
            
            let inset = 45; 
            let boundsW = (canvas.width / 2) - inset;
            let boundsH = (canvas.height / 2) - inset;
            
            let absCos = Math.abs(Math.cos(angle));
            let absSin = Math.abs(Math.sin(angle));
            
            let tDist = 1;
            if (boundsW * absSin > boundsH * absCos) {
                tDist = boundsH / absSin;
            } else {
                tDist = boundsW / absCos;
            }
            
            let px = cx + Math.cos(angle) * tDist;
            let py = cy + Math.sin(angle) * tDist;

            let tPulse = b.pulsePhase % (Math.PI * 2);
            let beatVal = 0;
            if (tPulse < 0.5) beatVal = Math.sin(tPulse / 0.5 * Math.PI);
            else if (tPulse > 0.7 && tPulse < 1.2) beatVal = Math.sin((tPulse - 0.7) / 0.5 * Math.PI);
            let beat = Math.pow(Math.max(0, beatVal), 2);
            let arrowScale = 2.0 + 1.2 * beat; 
            
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(angle);
            ctx.scale(arrowScale, arrowScale);
            ctx.fillStyle = b.team === C.TEAMS.ANT ? '#f02424' : '#f5d142';
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(-8, -10);
            ctx.lineTo(-4, 0);
            ctx.lineTo(-8, 10);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
    });

    updateHUD();
    requestAnimationFrame(loop);
}

document.getElementById('speed').addEventListener('input', e => { 
    speedMult = SPEED_STEPS[parseInt(e.target.value)]; 
    document.getElementById('speed-val').innerText = speedMult + 'x'; 
});
document.getElementById('resources').addEventListener('input', e => {
    targetResourceCount = parseInt(e.target.value); document.getElementById('res-val').innerText = targetResourceCount;
    while(resources.length < targetResourceCount) spawnResource();
    if(resources.length > targetResourceCount) resources.length = targetResourceCount;
});
document.getElementById('gather-amount').addEventListener('input', e => {
    gatherAmount = parseInt(e.target.value); document.getElementById('gather-val').innerText = gatherAmount;
});
document.getElementById('restart').addEventListener('click', initGame);
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

initGame();
requestAnimationFrame(loop);
</script>
</body>
